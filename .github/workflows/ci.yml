name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least-privilege token (build/lint only need to read the repo)
permissions:
  contents: read

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: application/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Test (uses an in-memory MongoDB)
        run: npm test

  client:
    name: Client (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: application/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      # The frontend has no Docker image of its own — it is built here and
      # published as an artifact. The backend image bakes this dist in
      # (Dockerfile: COPY client/dist ./client/dist) and serves it.
      - name: Upload client/dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: application/client/dist
          if-no-files-found: error
