name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Lets the release pipeline reuse this exact suite as its test stage, so a
  # release ships only what already passed lint/build/test on the tagged commit.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: application/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Test (in-memory DB)
        env:
          NODE_ENV: test
        run: npm test

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: application/coverage/coverage-summary.json
          if-no-files-found: error

  # Publishes a shields.io endpoint JSON with the real line-coverage number to
  # the `badges` branch (single orphan commit, force-pushed). The README badge
  # reads it via img.shields.io/endpoint.
  coverage-badge:
    name: Coverage badge
    runs-on: ubuntu-latest
    needs: server
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download coverage summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-summary

      - name: Generate badge JSON and push to the badges branch
        run: |
          PCT=$(node -p "require('./coverage-summary.json').total.lines.pct.toFixed(1)")
          COLOR=$(node -p "const p=$PCT; p>=90?'brightgreen':p>=80?'green':p>=70?'yellowgreen':p>=60?'yellow':'red'")
          mkdir badges && cd badges
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > coverage.json
          git init -b badges
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          git commit -m "chore: coverage badge ${PCT}%"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" badges

  client:
    name: Client (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application/client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: application/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: application/client/dist
          if-no-files-found: error

  # Posts the server test coverage as a sticky PR comment (created once, updated
  # in place on every push). PR-only — skipped when ci.yml is reused as the
  # release test stage (workflow_call) and for fork PRs, whose read-only token
  # can't comment.
  coverage-comment:
    name: Coverage report (PR comment)
    runs-on: ubuntu-latest
    needs: server
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download coverage summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-summary

      - name: Build & post coverage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const t = JSON.parse(fs.readFileSync('coverage-summary.json', 'utf8')).total;
            const gate = 90;
            const lines = t.lines.pct;
            const ok = lines >= gate;
            const row = (name, m) => `| ${name} | ${m.pct.toFixed(1)}% | ${m.covered}/${m.total} |`;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const marker = '<!-- coverage-comment -->';
            const body = [
              marker,
              '## 🧪 Coverage report',
              '',
              '| Metric | % | Covered / Total |',
              '| --- | --: | --: |',
              row('Lines', t.lines),
              row('Statements', t.statements),
              row('Functions', t.functions),
              row('Branches', t.branches),
              '',
              ok
                ? `✅ Line coverage **${lines.toFixed(1)}%** meets the ${gate}% gate.`
                : `⚠️ Line coverage **${lines.toFixed(1)}%** is below the ${gate}% gate.`,
              '',
              `<sub>commit ${sha}</sub>`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
