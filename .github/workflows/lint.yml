name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: application/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  client:
    name: Client (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application/client

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: application/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
