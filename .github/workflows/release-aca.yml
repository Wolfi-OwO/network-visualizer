name: Release → Azure Container Apps

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v1.0.0)"
        required: true

permissions:
  id-token: write   # request the OIDC token for secretless Azure login
  contents: read

concurrency:
  group: release-aca
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # 0. Verify required repo Variables exist (fail fast with a clear message)
      # ----------------------------
      - name: Check config
        env:
          # Azure IDs + ACR credentials come from SECRETS; resource names from VARIABLES.
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          CONTAINERAPP_NAME: ${{ vars.CONTAINERAPP_NAME }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
        run: |
          miss=0
          for v in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID ACR_USERNAME ACR_PASSWORD RESOURCE_GROUP ACR_NAME CONTAINERAPP_NAME IMAGE_NAME; do
            if [ -z "${!v}" ]; then echo "::error::missing: $v"; miss=1; else echo "ok: $v"; fi
          done
          [ "$miss" = 0 ] || { echo "Azure IDs and ACR_USERNAME/ACR_PASSWORD must be SECRETS; RESOURCE_GROUP/ACR_NAME/CONTAINERAPP_NAME/IMAGE_NAME must be VARIABLES."; exit 1; }

      # ----------------------------
      # 1. Metadata
      # ----------------------------
      - name: Build metadata
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # ----------------------------
      # 2. Build frontend
      # ----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: application/client/package-lock.json

      - name: Build client
        working-directory: application/client
        env:
          VITE_APP_VERSION: ${{ steps.meta.outputs.version }}
          VITE_APP_REVISION: ${{ github.sha }}
          VITE_APP_CREATED: ${{ steps.meta.outputs.date }}
        run: |
          npm ci
          npm run build

      # ----------------------------
      # 3. Build the image on the runner and push it to ACR
      #    (registry credentials from the ACR_USERNAME / ACR_PASSWORD secrets —
      #    enable them with `az acr update -n <acr> --admin-enabled true`)
      # ----------------------------
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        run: |
          IMAGE="${{ vars.ACR_NAME }}.azurecr.io/${{ vars.IMAGE_NAME }}"
          docker build ./application \
            --build-arg APP_VERSION=${{ steps.meta.outputs.version }} \
            --build-arg VCS_REF=${{ github.sha }} \
            --build-arg BUILD_DATE=${{ steps.meta.outputs.date }} \
            -t "$IMAGE:${{ steps.meta.outputs.tag }}" \
            -t "$IMAGE:latest"
          docker push "$IMAGE:${{ steps.meta.outputs.tag }}"
          docker push "$IMAGE:latest"

      # ----------------------------
      # 4. Azure Login (OIDC — only needed to roll out the Container App)
      # ----------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ----------------------------
      # 5. Deploy to Container Apps
      # ----------------------------
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINERAPP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}