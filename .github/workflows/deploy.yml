name: Deploy

# Rolls the production Container App forward to an already-pushed image tag.
#
# There is exactly ONE Container App (vars.CONTAINERAPP_NAME, e.g. netviz). It
# runs in MULTIPLE-revision mode so that PR previews can live alongside
# production as extra, zero-traffic revisions of the same app (pr-preview.yml).
# Because of that, traffic is never implicit — this workflow cuts it over
# explicitly once the new revision is healthy.
#
# The `production` environment scopes RESOURCE_GROUP / CONTAINERAPP_NAME, its
# OIDC federated credential (subject repo:<owner>/<repo>:environment:production)
# and its "required reviewers" gate — see deploy/README.md.
on:
  workflow_call:
    inputs:
      tag:
        description: "Image tag to deploy (must exist in ACR)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: false
        default: production
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (must exist in ACR)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options:
          - production

permissions:
  id-token: write   # OIDC token for secretless Azure login
  contents: read

jobs:
  aca:
    name: Roll out to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      # Fail fast with a clear message when config is missing
      - name: Check config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          CONTAINERAPP_NAME: ${{ vars.CONTAINERAPP_NAME }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
        run: |
          echo "Deploying tag '${{ inputs.tag }}' to environment '${{ inputs.environment }}'"
          miss=0
          for v in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID RESOURCE_GROUP ACR_NAME CONTAINERAPP_NAME IMAGE_NAME; do
            if [ -z "${!v}" ]; then echo "::error::missing: $v"; miss=1; else echo "ok: $v"; fi
          done
          [ "$miss" = 0 ] || { echo "Azure IDs must be SECRETS; RESOURCE_GROUP/ACR_NAME/CONTAINERAPP_NAME/IMAGE_NAME must be VARIABLES (scope them to the '${{ inputs.environment }}' environment)."; exit 1; }

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create the new revision
        id: rev
        env:
          RG: ${{ vars.RESOURCE_GROUP }}
          APP: ${{ vars.CONTAINERAPP_NAME }}
          ACR: ${{ vars.ACR_NAME }}
          IMAGE: ${{ vars.IMAGE_NAME }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          # PR previews are zero-traffic revisions of this same app, so the app must
          # stay in multiple-revision mode and traffic must be shifted by hand.
          az containerapp revision set-mode -g "$RG" -n "$APP" --mode multiple -o none

          # The production revision is, by definition, the one currently serving all
          # the traffic. Copy the new revision FROM it rather than from `latest`:
          # `latest` may well be a PR preview, and copying that would drag the
          # preview's env overrides (MONGODB_DB_NAME, ALLOW_DEV_LOGIN) into
          # production — i.e. point production at a throwaway PR database.
          FROM=$(az containerapp show -g "$RG" -n "$APP" \
            --query "properties.configuration.ingress.traffic[?weight==\`100\`].revisionName | [0]" -o tsv)
          if [ -z "$FROM" ] || [ "$FROM" = "null" ]; then
            echo "::error::No single revision is serving 100% of traffic — refusing to guess which one is production."
            exit 1
          fi
          echo "Copying from production revision: $FROM"

          # Deterministic, DNS-safe revision suffix from the tag, made unique per run
          # so re-deploys (rollbacks) never collide with an existing revision.
          BASE=$(echo "$TAG" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | sed 's/-\+/-/g; s/^-//; s/-$//')
          SUFFIX=$(echo "${BASE}-${GITHUB_RUN_ID}" | cut -c1-40 | sed 's/-$//')
          REV="${APP}--${SUFFIX}"

          # MONGODB_CONNECTION_STRING is pinned explicitly: the app was renamed off
          # the old MONGO_URI variable, so relying on the inherited template alone
          # would leave a new revision on the localhost fallback.
          #
          # --min-replicas 0 buys idle cost at the price of a cold start: when nothing
          # has hit the app for a while it holds no replica at all, and the next visitor
          # waits for a container to come up. That is a deliberate trade for this app.
          # It also fixes what made it worth changing: scale is baked into a revision's
          # template and cannot be altered afterwards, so a revision created with
          # --min-replicas 1 keeps a replica alive FOREVER, including after it is
          # superseded and retained purely as a rollback target at zero traffic. With 0,
          # the retired revision costs nothing while staying one command from a rollback.
          az containerapp revision copy -g "$RG" -n "$APP" \
            --from-revision "$FROM" \
            --image "${ACR}.azurecr.io/${IMAGE}:${TAG}" \
            --revision-suffix "$SUFFIX" \
            --set-env-vars MONGODB_CONNECTION_STRING=secretref:mongo-uri \
            --min-replicas 0 --max-replicas 3 -o none

          echo "from=$FROM" >> "$GITHUB_OUTPUT"
          echo "rev=$REV"   >> "$GITHUB_OUTPUT"

      # Never send users at a revision that failed to boot.
      - name: Wait for the revision to be healthy
        env:
          RG: ${{ vars.RESOURCE_GROUP }}
          APP: ${{ vars.CONTAINERAPP_NAME }}
          REV: ${{ steps.rev.outputs.rev }}
        run: |
          set -euo pipefail

          # Since the revision is created with --min-replicas 0, an idle one holds no
          # replica and reports runningState=ScaledToZero. Waiting for "Running" would
          # therefore hang until it timed out and then fail a revision that is perfectly
          # fine. Accepting ScaledToZero as healthy would be worse: nothing would have
          # proven the container can boot at all, which is the one thing this gate is
          # here to prove before we hand it production traffic.
          #
          # So ask the revision to prove it, over its own FQDN. The request wakes it from
          # zero and only succeeds if the container starts AND serves HTTP — a stronger
          # guarantee than runningState ever gave us. The revision FQDN is addressable at
          # 0% traffic, so none of this is visible to users on the production URL.
          FQDN=$(az containerapp revision show -g "$RG" -n "$APP" --revision "$REV" \
            --query properties.fqdn -o tsv)
          echo "Probing https://$FQDN (this wakes the revision from zero)"

          for i in $(seq 1 40); do
            RUNNING=$(az containerapp revision show -g "$RG" -n "$APP" --revision "$REV" \
              --query properties.runningState -o tsv 2>/dev/null || echo "Unknown")

            # A revision that cannot start says so — no point probing it 40 times.
            case "$RUNNING" in
              Failed|Degraded)
                echo "::error::Revision $REV failed to start — traffic NOT shifted; production is untouched."
                az containerapp logs show -g "$RG" -n "$APP" --revision "$REV" --tail 50 --type console || true
                exit 1 ;;
            esac

            CODE=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 20 "https://$FQDN/" 2>/dev/null || echo "000")
            echo "[$i/40] runningState=$RUNNING probe=$CODE"
            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 400 ]; then
              echo "Revision $REV served HTTP $CODE — healthy."
              exit 0
            fi
            sleep 10
          done

          echo "::error::Revision $REV never served a successful response — traffic NOT shifted; production is untouched."
          az containerapp logs show -g "$RG" -n "$APP" --revision "$REV" --tail 50 --type console || true
          exit 1

      - name: Shift 100% of traffic to the new revision
        env:
          RG: ${{ vars.RESOURCE_GROUP }}
          APP: ${{ vars.CONTAINERAPP_NAME }}
          REV: ${{ steps.rev.outputs.rev }}
          FROM: ${{ steps.rev.outputs.from }}
        run: |
          set -euo pipefail

          # Give the new revision everything and explicitly zero whatever holds
          # traffic today, so the weights sum to 100 regardless of whether the CLI
          # merges into or replaces the existing traffic block.
          WEIGHTS=("${REV}=100")
          for R in $(az containerapp show -g "$RG" -n "$APP" \
              --query "properties.configuration.ingress.traffic[?weight > \`0\`].revisionName" -o tsv); do
            [ "$R" = "$REV" ] || WEIGHTS+=("${R}=0")
          done
          az containerapp ingress traffic set -g "$RG" -n "$APP" --revision-weight "${WEIGHTS[@]}" -o none

          FQDN=$(az containerapp show -g "$RG" -n "$APP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed '${{ inputs.tag }}' as revision '$REV' — 100% traffic at https://$FQDN"
          {
            echo "### Deployed to ${{ inputs.environment }}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Tag | \`${{ inputs.tag }}\` |"
            echo "| Revision | \`$REV\` |"
            echo "| URL | https://$FQDN |"
            echo "| Rolled back from | \`$FROM\` (kept active for rollback) |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Retire superseded production revisions
        env:
          RG: ${{ vars.RESOURCE_GROUP }}
          APP: ${{ vars.CONTAINERAPP_NAME }}
          REV: ${{ steps.rev.outputs.rev }}
          FROM: ${{ steps.rev.outputs.from }}
        run: |
          set -euo pipefail
          # Keep the new revision and the one it replaced (a one-command rollback:
          # `az containerapp ingress traffic set --revision-weight <old>=100`).
          # PR-preview revisions belong to pr-preview.yml and are never touched here.
          for OLD in $(az containerapp revision list -g "$RG" -n "$APP" \
              --query "[?properties.active].name" -o tsv); do
            case "$OLD" in
              "$REV"|"$FROM") continue ;;
              "${APP}--pr-"*)  continue ;;
            esac
            echo "Deactivating superseded production revision $OLD"
            az containerapp revision deactivate -g "$RG" -n "$APP" --revision "$OLD" -o none || true
          done
