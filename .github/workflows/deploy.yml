name: Deploy

# Rolls the Azure Container App to an already-pushed image tag, in a chosen
# environment (staging or production). Called by release.yml for each stage, or
# run manually to deploy/roll back any tag to any environment.
#
# The target environment selects its own scoped GitHub variables/secrets
# (RESOURCE_GROUP, CONTAINERAPP_NAME, …) and its own OIDC federated credential
# (subject: repo:<owner>/<repo>:environment:<environment>). Production can carry
# a "required reviewers" protection rule so the rollout waits for a manual
# approval — see deploy/README.md.
on:
  workflow_call:
    inputs:
      tag:
        description: "Image tag to deploy (must exist in ACR)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: false
        default: production
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (must exist in ACR)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write   # OIDC token for secretless Azure login
  contents: read

jobs:
  aca:
    name: Roll out to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    # The OIDC federated credential is bound to this environment
    # (subject: repo:<owner>/<repo>:environment:<environment>). The environment
    # also scopes RESOURCE_GROUP / CONTAINERAPP_NAME and any protection rules
    # (e.g. required reviewers on production pause the job for manual approval).
    environment: ${{ inputs.environment }}

    steps:
      # Fail fast with a clear message when config is missing
      - name: Check config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          CONTAINERAPP_NAME: ${{ vars.CONTAINERAPP_NAME }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
        run: |
          echo "Deploying tag '${{ inputs.tag }}' to environment '${{ inputs.environment }}'"
          miss=0
          for v in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID RESOURCE_GROUP ACR_NAME CONTAINERAPP_NAME IMAGE_NAME; do
            if [ -z "${!v}" ]; then echo "::error::missing: $v"; miss=1; else echo "ok: $v"; fi
          done
          [ "$miss" = 0 ] || { echo "Azure IDs must be SECRETS; RESOURCE_GROUP/ACR_NAME/CONTAINERAPP_NAME/IMAGE_NAME must be VARIABLES (scope them to the '${{ inputs.environment }}' environment)."; exit 1; }

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINERAPP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.IMAGE_NAME }}:${{ inputs.tag }}
