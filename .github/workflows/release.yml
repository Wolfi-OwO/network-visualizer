name: Release

# Fully automatic release pipeline. Nothing here is triggered by hand.
#
#   push to main
#        |
#        v
#   release-please  --(opens/updates a "chore(main): release X.Y.Z" PR)-->  waits
#        |
#        | (a maintainer merges that PR)
#        v
#   release-please  --(bumps every version file, writes CHANGELOG.md,
#        |             tags vX.Y.Z, publishes the GitHub Release)
#        v
#     test  ->  package  ->  deploy production (gated)
#
# HOW THE VERSION NUMBER IS DECIDED
# Commits on main are Conventional Commits. release-please reads the ones added
# since the last tag and derives the next semver:
#   fix:              -> patch   (2.3.0 -> 2.3.1)
#   feat:             -> minor   (2.3.0 -> 2.4.0)
#   BREAKING CHANGE:  -> major   (2.3.0 -> 3.0.0)
# It then writes that version into EVERY file that records it, in one commit:
#   .release-please-manifest.json, version.txt, CHANGELOG.md,
#   application/package.json         + application/package-lock.json,
#   application/client/package.json  + application/client/package-lock.json
# (that file list lives in release-please-config.json under "extra-files").
# The tag and the version files therefore come from the same commit and cannot
# drift apart. ci.yml re-checks this with a "Version consistency" job.
# See docs/releasing.md for the full walkthrough.
#
# WHY THE SHIP STAGES LIVE IN THIS FILE
# A GitHub Release published with the default GITHUB_TOKEN does NOT trigger other
# workflows — it is GitHub's recursion guard. A separate `on: release: published`
# workflow would therefore never fire, and the release would sit there un-shipped.
# Keeping test/package/deploy in the same run, gated on release-please's
# `release_created` output, makes the chain work regardless of which token is used.
#
# WHY RELEASE-PLEASE USES A PAT (RELEASE_PLEASE_TOKEN)
# The same recursion guard applies to the release PR itself: a pull request opened
# by GITHUB_TOKEN does not trigger `pull_request` workflows. Under branch
# protection that is a deadlock — the release PR requires CI, Lint and the version
# check to pass, but those workflows never start, so the PR can never be merged.
# (v2.4.0 had to be unblocked by hand: close and reopen the PR so a human event
# would start the checks.)
#
# The same token also decides the *author* of the release commit. With
# GITHUB_TOKEN, release commits are authored by github-actions[bot], which puts the
# bot in the repository's contributor list and adds a bot Co-authored-by trailer to
# the squash commit.
#
# A PAT belonging to a maintainer fixes both: the release PR is an ordinary PR that
# runs its own checks, and the release commit is authored by a human. The cost is a
# secret that has to be rotated when it expires — hence the GITHUB_TOKEN fallback
# below, which degrades to the old (still-working, still-manual) behaviour rather
# than breaking the release outright.
on:
  push:
    branches: [main]

permissions:
  contents: write        # release-please: push the release commit and the tag
  pull-requests: write   # release-please: open/update the release PR
  id-token: write        # deploy.yml: OIDC login to Azure

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Stage 0 — maintain the release PR. On the run where that PR lands, tag the
  # commit and publish the GitHub Release.
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      # 'true' only on the run where the release PR was merged and the tag pushed.
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # RELEASE_PLEASE_TOKEN is a PAT owned by a human maintainer. It is what
          # makes the release PR behave like an ordinary PR; see the note above.
          # The fallback keeps this workflow working (with the GITHUB_TOKEN caveats)
          # if the secret is absent or expires, rather than failing the release.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  # Every stage below runs ONLY on the release commit. On an ordinary push to
  # main they are skipped, so day-to-day merges stay cheap.

  # Stage 1 — re-run the full suite on the exact tagged commit, so nothing ships
  # that hasn't passed lint/build/test.
  test:
    name: Test
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    permissions:
      contents: read
      # ci.yml declares a coverage-comment job that requests pull-requests: write.
      # GitHub validates a reusable workflow's job permissions against the caller
      # even when the job is skipped by its `if`, so the caller must grant it —
      # it goes unused during a release.
      pull-requests: write

  # Stage 2 — build the client + Docker image and push it to ACR as vX.Y.Z.
  package:
    name: Package
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/package.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
    permissions:
      contents: read

  # Stage 3 — the go-live gate. The `production` environment's "Required
  # reviewers" protection rule makes this job wait for a maintainer's approval.
  # deploy.yml then rolls the image onto the Container App and shifts 100% of
  # traffic to the new revision once it reports healthy.
  #
  # Releases are the ONLY thing that moves production traffic; pull requests get
  # 0%-traffic preview revisions on the same app (see pr-preview.yml). To roll
  # back, dispatch deploy.yml by hand with an older tag.
  deploy-production:
    name: Deploy · production
    needs: [release-please, package]
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
      environment: production
    secrets: inherit
    permissions:
      id-token: write
      contents: read
