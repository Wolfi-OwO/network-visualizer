name: Release

# Staged release pipeline for a published GitHub Release (tag v1.2.3):
#
#   test  →  package  →  deploy (staging)  →  deploy (production, gated)
#
# 1. test        — re-runs the full CI suite (lint/build/tests) on the tagged
#                  commit, so nothing ships that hasn't passed.
# 2. package     — builds the client + Docker image and pushes it to ACR.
# 3. staging     — rolls the image out to the `staging` environment (automatic).
# 4. production  — rolls the SAME image out to `production`. Configure the
#                  `production` environment with "Required reviewers" so this
#                  job waits for a maintainer's approval — that is the manual
#                  gate to promote a release to production.
#
# The heavy lifting lives in the reusable ci.yml / package.yml / deploy.yml
# workflows, which can also be dispatched individually (deploy.yml doubles as
# the rollback tool for any tag and environment). See deploy/README.md.
on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: Test
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  package:
    name: Package
    needs: test
    uses: ./.github/workflows/package.yml
    with:
      tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  deploy-staging:
    name: Deploy · staging
    needs: package
    uses: ./.github/workflows/deploy.yml
    with:
      tag: ${{ github.event.release.tag_name }}
      environment: staging
    secrets: inherit
    permissions:
      id-token: write
      contents: read

  deploy-production:
    name: Deploy · production
    # Only after staging is live; the `production` environment's protection
    # rule (required reviewers) turns this into a manual promotion gate.
    needs: deploy-staging
    uses: ./.github/workflows/deploy.yml
    with:
      tag: ${{ github.event.release.tag_name }}
      environment: production
    secrets: inherit
    permissions:
      id-token: write
      contents: read
