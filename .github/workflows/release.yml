name: Release

# Production release pipeline for a published GitHub Release (tag v1.2.3):
#
#   test  →  package  →  deploy (production, gated)
#
# 1. test        — re-runs the full CI suite (lint/build/tests) on the tagged
#                  commit, so nothing ships that hasn't passed.
# 2. package     — builds the client + Docker image and pushes it to ACR.
# 3. production  — deploy.yml rolls the image onto the shared Container App and
#                  shifts 100% of traffic to the new revision. Give the
#                  `production` environment a "Required reviewers" rule so this
#                  job waits for a maintainer's approval — the manual go-live gate.
#
# Releases are the ONLY thing that moves production traffic. Pull requests get
# 0%-traffic preview revisions on the same app (see pr-preview.yml).
on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: Test
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  package:
    name: Package
    needs: test
    uses: ./.github/workflows/package.yml
    with:
      tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  deploy-production:
    name: Deploy · production
    # The `production` environment's protection rule (required reviewers) turns
    # this into a manual promotion gate.
    needs: package
    uses: ./.github/workflows/deploy.yml
    with:
      tag: ${{ github.event.release.tag_name }}
      environment: production
    secrets: inherit
    permissions:
      id-token: write
      contents: read
