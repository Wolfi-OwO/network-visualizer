name: Bug report
description: Something does not work as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For security vulnerabilities, please follow
        [SECURITY.md](../../SECURITY.md) instead of opening a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ..., the app ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the network builder
        2. Add a router and a switch
        3. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Network builder / simulation
        - Packet capture
        - CIDR calculator
        - Sign-in / accounts / roles
        - Admin console / audit / metrics
        - Status page
        - API / backend
        - Deployment / Docker
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag, image tag, or commit hash (shown in the footer).
      placeholder: v1.2.3 / 3682d24
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser + OS, and how the app is running (dev servers, Docker Compose, ACA, ...).
      placeholder: Firefox 140 on Linux, docker compose up
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Backend logs, browser console output, or screenshots.
      render: shell
