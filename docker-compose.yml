# Run the full stack: `docker compose up --build`
# Frontend served on http://localhost:8080 (proxies /api → backend)
services:
  mongo:
    image: mongo:7
    # Equivalent of: docker run -p 27017:27017 mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: ./application
    environment:
      NODE_ENV: production
      PORT: "8080"
      MONGO_URI: "mongodb://mongo:27017/netviz"
    depends_on:
      - mongo
    expose:
      - "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ./application/client
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  mongo-data:
